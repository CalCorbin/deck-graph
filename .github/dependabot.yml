version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    groups:
      production-dependencies:
        patterns:
          - "@tanstack/*"
          - "d3"
          - "next"
          - "react"
          - "react-dom"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        patterns:
          - "@types/*"
          - "@testing-library/*"
          - "@tailwindcss/*"
          - "eslint*"
          - "jest*"
          - "prettier*"
          - "tailwindcss"
          - "typescript"
          - "ts-*"
        update-types:
          - "minor"
          - "patch"
      major-updates:
        patterns:
          - "*"
        update-types:
          - "major"
    ignore:
      # Ignore patch updates for stable packages
      - dependency-name: "react"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-patch"]
    commit-message:
      prefix: "deps"
      include: "scope"
